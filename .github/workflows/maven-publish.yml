# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven
# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
name: Java CI with Maven - Continuous Integration
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  release:
    types: [created]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 22
        uses: actions/setup-java@v3
        with:
          java-version: '22'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          settings-path: ${{ github.workspace }}
          cache: maven
      - name: Run JUnit Tests
        run: mvn test
      - name: Verify setting.xml
        run: |
          ls -al $GITHUB_WORKSPACE
          test -f $GITHUB_WORKSPACE/setting.xml && echo "setting.xml found"
      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
      # ------------------ INSPECTION SONARCLOUD ------------------
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Run SonarCloud Inspection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B sonar:sonar \
            -s $GITHUB_WORKSPACE/setting.xml \
            -Dsonar.projectKey=MKEPL_TUBES_MKEPL \
            -Dsonar.organization=mkepl \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.qualitygate.wait=true
      # -------------------------------------------------------------
      - name: Debug GitHub Context
        run: |
          echo "Actor: $GITHUB_ACTOR"
          echo "Repository: $GITHUB_REPOSITORY"
      - name: Publish to GitHub Packages Apache Maven
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: mvn -B deploy -s $GITHUB_WORKSPACE/setting.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-staging:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: staging
      - name: Set up JDK 22
        uses: actions/setup-java@v3
        with:
          java-version: '22'
          distribution: 'temurin'
      - name: Smoke test di lingkungan staging
        run: |
          echo "=== Deploy ke staging ==="
          echo "1" | java -jar staging/*.jar || true
          echo "Staging deployment selesai pada $(date)"

  deploy-production:
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: production
      - name: Create GitHub Release (Production)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: production/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}